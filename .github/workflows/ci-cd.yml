name: CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      frontend-artifact: frontend-dist
      backend-artifact: backend-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build solution
        run: |
          dotnet restore backend/CampBooking.slnx
          dotnet build backend/CampBooking.slnx --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test backend/CampBooking.Tests/CampBooking.Tests.csproj --configuration Release --no-build --verbosity minimal

      - name: Publish backend
        run: |
          rm -rf backend/backend-publish || true
          dotnet publish backend/CampBooking.API/CampBooking.API.csproj -c Release -o backend/backend-publish

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend/backend-publish

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy-backend:
    name: Deploy Backend to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: CampBooking-backend
          package: backend-publish

  deploy-frontend:
    name: Deploy Frontend to Azure Static Web App
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          app_artifact_location: "frontend/dist"

# Notes:
# - Add the repository secret `AZURE_CREDENTIALS` for Azure service principal login.
# - Add the repository secret `AZURE_STATIC_WEB_APPS_API_TOKEN` for the Azure Static Web App deployment.
# - `GITHUB_TOKEN` is provided automatically for the deployment.
#
# Use these secrets in GitHub repository Settings → Secrets and variables → Actions.
# `AZURE_CREDENTIALS` is a JSON string from an Azure AD service principal, not a publish profile.
# `AZURE_STATIC_WEB_APPS_API_TOKEN` is the token from your Azure Static Web App deployment center.
